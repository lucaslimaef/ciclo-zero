<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --bg:#0a0a16;
    --roxo:#7c3aed; --azul:#4f46e5;
    --neon:#a78bfa; --neon2:#818cf8;
    --txt:#ece9ff; --txt2:#9b96c7;
    --lock:#1c1b33;
    --gold:#fbbf24; --gold2:#f59e0b;
    --verde:#34d399; --verde2:#10b981;
    --w1:linear-gradient(160deg,#4f46e5,#7c3aed);
    --w2:linear-gradient(160deg,#6d28d9,#4f46e5);
    --w3:linear-gradient(160deg,#8b5cf6,#6366f1);
    --w4:linear-gradient(160deg,#a855f7,#7c3aed);
  }
  html,body{ background:var(--bg); color:var(--txt); font-family:'Segoe UI',system-ui,sans-serif; }
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(124,58,237,.28), transparent 60%),
      radial-gradient(900px 500px at 90% 30%, rgba(79,70,229,.18), transparent 60%),
      var(--bg);
    min-height:100vh; overflow-x:hidden;
  }
  .wrap{ max-width:520px; margin:0 auto; padding:0 18px 80px; }

  header{ text-align:center; padding:30px 0 8px; }
  .kicker{
    display:inline-block; font-size:11px; letter-spacing:2.5px; text-transform:uppercase;
    color:var(--neon); border:1px solid rgba(167,139,250,.4); border-radius:99px;
    padding:5px 14px; margin-bottom:14px; background:rgba(124,58,237,.1);
  }
  h1{
    font-size:48px; line-height:1; font-weight:800; letter-spacing:-1px;
    background:linear-gradient(120deg,#fff, var(--neon) 60%, var(--neon2));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .sub{ color:var(--txt2); font-size:14.5px; margin-top:12px; line-height:1.5; }
  .sub b{ color:var(--txt); font-weight:600; }

  .hero-btn{
    display:flex; align-items:center; justify-content:center; gap:9px;
    width:100%; max-width:360px; margin:22px auto 6px;
    border:none; cursor:pointer; font-family:inherit; font-weight:800; font-size:17px;
    color:#fff; padding:16px 20px; border-radius:18px;
    background:linear-gradient(120deg,var(--azul),var(--roxo),var(--neon));
    box-shadow:0 12px 30px rgba(124,58,237,.5); transition:transform .12s ease, box-shadow .12s;
  }
  .hero-btn:active{ transform:scale(.97); box-shadow:0 6px 18px rgba(124,58,237,.5); }
  .hero-btn .em{ font-size:20px; }
  .game-btn{
    display:inline-flex; align-items:center; gap:8px; margin:4px auto 0;
    border:1.5px solid rgba(52,211,153,.45); background:rgba(16,185,129,.1); cursor:pointer;
    font-family:inherit; font-weight:700; font-size:13.5px; color:var(--verde);
    padding:10px 18px; border-radius:99px; text-decoration:none;
  }
  .game-btn:active{ transform:scale(.97); }

  .progress{
    margin:18px auto 8px; max-width:360px;
    background:rgba(255,255,255,.06); border-radius:99px; height:14px; overflow:hidden;
    border:1px solid rgba(255,255,255,.08); position:relative;
  }
  .progress .bar{
    height:100%; width:0%; border-radius:99px;
    background:linear-gradient(90deg,var(--azul),var(--roxo),var(--neon));
    box-shadow:0 0 16px rgba(124,58,237,.7); transition:width .6s cubic-bezier(.2,.8,.2,1);
  }
  .stats{ display:flex; justify-content:center; gap:14px; margin-bottom:6px; flex-wrap:wrap; }
  .chip{
    font-size:12.5px; color:var(--txt2); display:flex; align-items:center; gap:5px;
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
    padding:5px 12px; border-radius:99px;
  }
  .chip b{ color:var(--neon); font-weight:700; font-size:14px; }
  .chip.done b{ color:var(--gold); }

  .trail{ position:relative; margin-top:14px; }
  .trail svg{ position:absolute; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; }
  .node{
    position:absolute; width:84px; height:84px; transform:translate(-50%,-50%);
    z-index:2; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:transform .15s ease;
  }
  .node:active{ transform:translate(-50%,-50%) scale(.92); }
  .disc{
    width:66px; height:66px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; position:relative; font-size:27px;
  }
  .node.locked .disc{ background:var(--lock); border:2px solid #2c2a4d; color:#564f86; }
  .node.locked .disc .ic{ font-size:23px; opacity:.85; }
  .node.next .disc{
    background:var(--lock); border:2px solid var(--neon); color:var(--neon);
    animation:pulse 1.7s infinite;
  }
  .node.next .disc .ic{ font-size:26px; }
  .node.open .disc{
    border:2px solid var(--neon); color:#fff;
    box-shadow:0 6px 22px rgba(124,58,237,.5), 0 0 0 6px rgba(124,58,237,.12);
  }
  .node.open.w1 .disc{ background:var(--w1); }
  .node.open.w2 .disc{ background:var(--w2); }
  .node.open.w3 .disc{ background:var(--w3); }
  .node.open.w4 .disc{ background:var(--w4); }
  .node.done .disc{
    background:linear-gradient(160deg,var(--gold),var(--gold2)); border:2px solid #fde68a;
    color:#5b3a00; box-shadow:0 6px 24px rgba(245,158,11,.55), 0 0 0 6px rgba(245,158,11,.15);
  }
  @keyframes pulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(167,139,250,.45);}
    50%{ box-shadow:0 0 0 13px rgba(167,139,250,0);}
  }
  .node .day-tag{
    position:absolute; bottom:-15px; left:50%; transform:translateX(-50%);
    font-size:10.5px; color:var(--txt2); white-space:nowrap; font-weight:700; letter-spacing:.5px;
  }
  .node.open .day-tag, .node.next .day-tag{ color:var(--neon); }
  .node.done .day-tag{ color:var(--gold); }

  .week-flag{
    position:absolute; z-index:1; left:50%; transform:translateX(-50%);
    font-size:11.5px; letter-spacing:1.5px; text-transform:uppercase; font-weight:700;
    color:#fff; padding:6px 16px; border-radius:99px; white-space:nowrap;
    display:flex; align-items:center; gap:7px;
  }
  .week-flag.f1{ background:rgba(79,70,229,.9); }
  .week-flag.f2{ background:rgba(109,40,217,.9); }
  .week-flag.f3{ background:rgba(139,92,246,.9); }
  .week-flag.f4{ background:rgba(168,85,247,.9); }

  .overlay{
    position:fixed; inset:0; background:rgba(5,4,14,.78); backdrop-filter:blur(6px);
    display:none; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .overlay.show{ display:flex; }
  .modal{
    background:linear-gradient(180deg,#16142e,#0f0e22); width:100%; max-width:440px;
    border:1px solid rgba(167,139,250,.3); border-radius:24px; padding:24px 22px;
    box-shadow:0 30px 80px rgba(0,0,0,.6); max-height:90vh; overflow-y:auto;
    animation:pop .25s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes pop{ from{ transform:scale(.9); opacity:0;} to{ transform:scale(1); opacity:1;} }
  .modal .x{
    float:right; font-size:26px; color:var(--txt2); cursor:pointer; line-height:1;
    border:none; background:none; padding:0 4px;
  }
  .m-emoji{ font-size:40px; line-height:1; }
  .m-day{ font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--neon); font-weight:700; margin-top:6px; }
  .m-title{ font-size:26px; font-weight:800; margin:5px 0 4px; letter-spacing:-.5px; }
  .m-week{ font-size:12.5px; color:var(--txt2); margin-bottom:16px; }

  .foco{
    background:rgba(129,140,248,.1); border:1px solid rgba(129,140,248,.28);
    border-radius:14px; padding:12px 15px; font-size:14px; line-height:1.5; color:#d7dcf5; margin-bottom:18px;
  }
  .foco b{ color:#fff; }

  .lock-emoji{ font-size:46px; text-align:center; margin:6px 0 10px; }
  .lock-txt{ text-align:center; color:var(--txt2); font-size:14px; line-height:1.5; margin-bottom:18px; }
  .lock-txt b{ color:var(--txt); }
  .field{ display:flex; gap:8px; margin-top:6px; }
  .field input{
    flex:1; background:rgba(255,255,255,.06); border:1.5px solid rgba(167,139,250,.3);
    border-radius:14px; padding:14px 16px; color:#fff; font-size:16px; outline:none;
    text-transform:uppercase; letter-spacing:1px; font-weight:600;
  }
  .field input:focus{ border-color:var(--neon); box-shadow:0 0 0 4px rgba(124,58,237,.18); }
  .btn{
    border:none; cursor:pointer; font-family:inherit; font-weight:700; font-size:15px;
    background:linear-gradient(120deg,var(--azul),var(--roxo)); color:#fff;
    border-radius:14px; padding:14px 20px; box-shadow:0 8px 22px rgba(124,58,237,.4);
    transition:transform .1s ease; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn:active{ transform:scale(.96); }
  .btn.full{ width:100%; }
  .btn.gold{ background:linear-gradient(120deg,var(--gold),var(--gold2)); color:#5b3a00; box-shadow:0 8px 22px rgba(245,158,11,.4); }
  .btn.ghost{ background:transparent; border:1.5px solid rgba(167,139,250,.35); color:var(--neon); box-shadow:none; }
  .btn.done-state{ background:rgba(52,211,153,.16); border:1.5px solid rgba(52,211,153,.5); color:#6ee7b7; box-shadow:none; }
  .err{ color:#fb7185; font-size:13px; text-align:center; margin-top:12px; min-height:18px; font-weight:600; }

  .block{ margin-bottom:16px; }
  .block-h{
    display:flex; align-items:center; gap:8px; font-size:12px; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--neon2); font-weight:700; margin-bottom:10px;
  }
  .ex-list{ list-style:none; display:flex; flex-direction:column; gap:8px; }
  .ex-list li{
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
    border-left:3px solid var(--roxo); border-radius:12px; padding:11px 14px;
    font-size:14.5px; color:var(--txt); line-height:1.4;
  }
  .tip{
    margin-top:10px; font-size:13px; color:#c8cde8; line-height:1.5;
    background:rgba(124,58,237,.1); border:1px dashed rgba(167,139,250,.35);
    border-radius:12px; padding:10px 13px;
  }
  .tip b{ color:var(--neon); }

  /* alimentacao */
  .food{
    background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(79,70,229,.08));
    border:1px solid rgba(52,211,153,.25); border-radius:16px; padding:15px 16px;
  }
  .food .tema{ font-size:14.5px; color:#eafff5; font-weight:600; line-height:1.45; margin-bottom:11px; }
  .food ul{ list-style:none; display:flex; flex-direction:column; gap:7px; }
  .food li{ font-size:13.8px; color:#d8e9e2; line-height:1.45; padding-left:22px; position:relative; }
  .food li::before{ content:"🥗"; position:absolute; left:0; font-size:13px; }
  .food .ideia{
    margin-top:12px; background:rgba(52,211,153,.14); border-radius:11px; padding:10px 13px;
    font-size:13.8px; color:#eafff5; line-height:1.45;
  }
  .food .ideia b{ color:var(--verde); }
  .food .disc{
    all:unset; display:block; margin-top:11px; font-size:11px; color:#7e8aa6; line-height:1.4; font-style:italic;
  }

  .habit{
    background:linear-gradient(120deg,rgba(79,70,229,.18),rgba(124,58,237,.14));
    border:1px solid rgba(167,139,250,.3); border-radius:14px; padding:14px 16px;
    font-size:14.5px; line-height:1.5;
  }

  /* bloco do jogo */
  .game{
    background:linear-gradient(135deg,#10241f,#16142e);
    border:1px solid rgba(52,211,153,.35); border-radius:16px; padding:16px; text-align:center; margin-bottom:16px;
  }
  .game .gh{ font-size:15px; font-weight:800; color:#fff; margin-bottom:5px; display:flex; align-items:center; justify-content:center; gap:7px; }
  .game p{ font-size:13.3px; color:#bfe9d9; line-height:1.5; margin-bottom:12px; }
  .game a{
    display:inline-flex; align-items:center; gap:8px; background:linear-gradient(120deg,var(--verde2),var(--verde));
    color:#04241a; font-weight:800; text-decoration:none; padding:12px 22px; border-radius:99px; font-size:14px;
  }

  .frase{
    text-align:center; font-style:italic; color:var(--neon); font-size:15.5px;
    line-height:1.5; margin:18px 0; padding:0 6px;
  }
  .m-actions{ display:flex; flex-direction:column; gap:10px; margin-top:14px; }
  .m-actions .row2{ display:flex; gap:10px; }
  .m-actions .row2 .btn{ flex:1; }

  .cta{
    background:linear-gradient(135deg,var(--roxo),var(--azul));
    border-radius:18px; padding:20px; text-align:center; margin-top:16px;
  }
  .cta h3{ font-size:19px; margin-bottom:8px; }
  .cta p{ font-size:14px; opacity:.92; line-height:1.5; margin-bottom:14px; }
  .cta a{
    display:inline-flex; align-items:center; gap:8px; background:#fff; color:#5b21b6; font-weight:800;
    text-decoration:none; padding:13px 26px; border-radius:99px; font-size:15px;
  }

  #confetti{ position:fixed; inset:0; pointer-events:none; z-index:100; overflow:hidden; }
  .conf{ position:absolute; top:-40px; font-size:26px; animation:fall linear forwards; }
  @keyframes fall{
    0%{ transform:translateY(-40px) rotate(0deg); opacity:1; }
    100%{ transform:translateY(105vh) rotate(360deg); opacity:.9; }
  }

  footer{ text-align:center; margin-top:46px; color:#5a567e; font-size:11.5px; line-height:1.6; }
  footer .disc-foot{ display:block; max-width:420px; margin:0 auto 10px; color:#46426e; }
  footer .reset{ color:#46426e; background:none; border:none; cursor:pointer; text-decoration:underline; font-size:11.5px; }

  /* ===== TARJA "EM BREVE" ===== */
  body.teaser-on{ overflow:hidden; height:100vh; }
  body.teaser-on .wrap{ filter:blur(8px) saturate(.7) brightness(.5); pointer-events:none; user-select:none; }
  #teaser{ display:none; }
  body.teaser-on #teaser{
    display:flex; position:fixed; inset:0; z-index:400; overflow:hidden;
    align-items:center; justify-content:center; padding:22px;

  }
  #teaser .band{
    position:absolute; left:-30%; width:160%; white-space:nowrap; overflow:hidden;
    color:#fff; font-weight:900; letter-spacing:5px; text-transform:uppercase; font-size:15px;
    padding:11px 0; text-align:center; transform:rotate(-7deg); opacity:.96;
    border-top:2px dashed rgba(255,255,255,.45); border-bottom:2px dashed rgba(255,255,255,.45);
    box-shadow:0 16px 34px rgba(0,0,0,.45); text-shadow:0 1px 2px rgba(0,0,0,.3);
  }
  #teaser .band.b1{ top:13%; background:linear-gradient(100deg,var(--azul),var(--roxo)); }
  #teaser .band.b2{ top:45%; background:linear-gradient(100deg,var(--roxo),var(--neon)); }
  #teaser .band.b3{ top:77%; background:linear-gradient(100deg,var(--azul),var(--roxo)); }
  #teaser .card{
    position:relative; z-index:2; max-width:380px; text-align:center;
    background:rgba(13,12,34,.92); border:1px solid rgba(167,139,250,.45); border-radius:24px;
    padding:30px 24px; box-shadow:0 30px 80px rgba(0,0,0,.65); backdrop-filter:blur(2px);
  }
  #teaser .tkick{
    display:inline-block; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--neon);

    background:rgba(124,58,237,.12);
  }
  #teaser h2{
    font-size:38px; line-height:1.02; font-weight:800; letter-spacing:-1px; margin-bottom:14px;

  }

const DIAS = [
 {d:1, s:1, sem:"Semana 1 · Sair da inércia", tit:"Marco Zero", pal:"COMECEI", tipo:"Treino corpo todo",

function emojiDia(dia){
  if(dia.d===30) return "🏆";
  const t = dia.tipo.toLowerCase();
  if(t.includes("descanso")) return "😌";
  if(t.includes("movimento")) return "🚶";
  if(t.includes("circuito")||t.includes("amrap")) return "🔥";
  if(t.includes("inferior")) return "🦵";
  if(t.includes("superior")) return "💪";
  if(t.includes("core")) return "🌀";
  if(t.includes("corpo todo")) return "⚡";
  return "🏋️";
}

const JOGO_URL = "https://lucaslimaef.github.io/jogo-do-treino/";

// ====== ESTADO ======
const KEY = "cicloZero_unlocked";
const KEY_DONE = "cicloZero_done";
let unlocked = JSON.parse(localStorage.getItem(KEY) || "[]");
let done = JSON.parse(localStorage.getItem(KEY_DONE) || "[]");
let pendingDay = null;

const save = ()=>{ localStorage.setItem(KEY, JSON.stringify(unlocked)); localStorage.setItem(KEY_DONE, JSON.stringify(done)); };
const norm = s => s.toUpperCase().replace(/[ÁÀÂÃÄ]/g,"A").replace(/[ÉÊÈ]/g,"E")
  .replace(/[ÍÎÌ]/g,"I").replace(/[ÓÔÕÒ]/g,"O").replace(/[ÚÛÙ]/g,"U").replace(/Ç/g,"C")
  .replace(/[^A-Z0-9]/g,"").trim();

function celebrate(set){
  const box = document.getElementById('confetti');
  const emojis = set || ["💪","🔥","✨","🎉","⭐"];
  for(let i=0;i<22;i++){
    const s = document.createElement('span');
    s.className='conf'; s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left = Math.random()*100 + "vw";
    s.style.fontSize = (18+Math.random()*18) + "px";
    s.style.animationDuration = (1.6+Math.random()*1.3) + "s";
    s.style.animationDelay = (Math.random()*.35) + "s";
    box.appendChild(s);
    setTimeout(()=>s.remove(), 3200);
  }
}

const trail = document.getElementById('trail');
const SPACING = 118;
const TOP = 72;
const FLAG_H = 48;
let layout = [];

function buildLayout(){
  layout = [];
  const W = trail.clientWidth || 480;
  const cx = W/2;
  const amp = Math.min(W*0.30, 150);
  let y = TOP;
  let lastWeek = 0;
  let flags = [];
  DIAS.forEach((dia,i)=>{
    if(dia.s !== lastWeek){
      flags.push({y:y - 32, sem:dia.s});
      y += FLAG_H;
      lastWeek = dia.s;
    }
    const x = cx + Math.sin(i*0.7) * amp;
    layout.push({x, y, i});
    y += SPACING;
  });
  return {height:y + 40, flags};
}

function render(){
  const {height, flags} = buildLayout();
  trail.style.height = height + "px";
  trail.innerHTML = "";

  const svgNS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNS,"svg");
  svg.setAttribute("viewBox", `0 0 ${trail.clientWidth} ${height}`);
  let dPath = "";
  layout.forEach((p,idx)=>{ dPath += (idx===0?`M ${p.x} ${p.y}`:` L ${p.x} ${p.y}`); });
  const path = document.createElementNS(svgNS,"path");
  path.setAttribute("d", dPath);
  path.setAttribute("fill","none");
  path.setAttribute("stroke","rgba(124,58,237,.30)");
  path.setAttribute("stroke-width","5");
  path.setAttribute("stroke-linecap","round");
  path.setAttribute("stroke-dasharray","2 14");
  svg.appendChild(path);
  trail.appendChild(svg);

  const semInfo = {1:["Semana 1","🌱"],2:["Semana 2","🔁"],3:["Semana 3","🔥"],4:["Semana 4","🏆"]};
  flags.forEach(f=>{
    const el = document.createElement("div");
    el.className = "week-flag f"+f.sem;
    el.style.top = f.y + "px";
    el.innerHTML = `<span>${semInfo[f.sem][1]}</span> ${semInfo[f.sem][0]}`;
    trail.appendChild(el);
  });

  let nextDay = null;
  for(const dia of DIAS){ if(!unlocked.includes(dia.d)){ nextDay = dia.d; break; } }

  layout.forEach(p=>{
    const dia = DIAS[p.i];
    const isOpen = unlocked.includes(dia.d);
    const isDone = done.includes(dia.d);
    const isNext = dia.d === nextDay;
    const node = document.createElement("div");
    let cls = "node ";
    if(isDone) cls += "done w"+dia.s;
    else if(isOpen) cls += "open w"+dia.s;
    else if(isNext) cls += "next";
    else cls += "locked";
    node.className = cls;
    node.style.left = p.x + "px";
    node.style.top = p.y + "px";
    let face;
    if(isDone) face = "🏆";
    else if(isOpen) face = emojiDia(dia);
    else if(isNext) face = `<span class="ic">⭐</span>`;
    else face = `<span class="ic">🔒</span>`;
    node.innerHTML = `<div class="disc">${face}</div><span class="day-tag">Dia ${dia.d}</span>`;
    node.onclick = ()=> openDay(dia);
    trail.appendChild(node);
  });

  document.getElementById('count').textContent = unlocked.length;
  document.getElementById('countDone').textContent = done.length;
  document.getElementById('bar').style.width = (unlocked.length/30*100) + "%";

  const label = document.getElementById('heroLabel');
  const heroEm = document.querySelector('#heroBtn .em');
  if(unlocked.length >= 30 && done.length >= 30){ label.textContent = "Você fechou o Ciclo Zero!"; heroEm.textContent="🏆"; }
  else if(nextDay === null){ label.textContent = "Ver meu treino de hoje"; heroEm.textContent="💪"; }
  else { label.textContent = "Abrir o dia de hoje"; heroEm.textContent="⚡"; }
}

function openDay(dia){
  if(unlocked.includes(dia.d)) showContent(dia);
  else openLock(dia);
}

function irParaHoje(){
  let alvo = DIAS.find(d=>!unlocked.includes(d.d));
  if(!alvo) alvo = DIAS.find(d=>!done.includes(d.d));
  if(!alvo) alvo = DIAS[29];
  openDay(alvo);
}
document.getElementById('heroBtn').onclick = irParaHoje;

function openLock(dia){
  pendingDay = dia;
  document.getElementById('lockDay').textContent = "Dia " + dia.d;
  document.getElementById('wordInput').value = "";
  document.getElementById('err').textContent = "";
  document.getElementById('lockOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('wordInput').focus(), 100);
}
function tryUnlock(){
  if(!pendingDay) return;
  const val = norm(document.getElementById('wordInput').value);
  if(!val) return;
  if(val === norm(pendingDay.pal)){
    if(!unlocked.includes(pendingDay.d)){
      unlocked.push(pendingDay.d); save();
      if(window.fbq) fbq('trackCustom','DiaDestravado',{dia:pendingDay.d});
    }
    const dia = pendingDay;
    closeAll(); render(); celebrate(["🔓","✨","🎉","⭐"]);
    setTimeout(()=>showContent(dia), 250);
  } else {
    document.getElementById('err').textContent = "Palavra errada. Confere no grupo o que o Lucas mandou hoje.";
    document.getElementById('wordInput').focus();
  }
}
document.getElementById('unlockBtn').onclick = tryUnlock;
document.getElementById('wordInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });

function showContent(dia){
  const m = document.getElementById('contentModal');
  const exItems = dia.treino.map(t=>`<li>${t}</li>`).join("");
  const foodItems = dia.alimDicas.map(t=>`<li>${t}</li>`).join("");
  const isDone = done.includes(dia.d);
  const proximo = DIAS.find(d=> d.d===dia.d+1 && unlocked.includes(d.d));
  const ctaBlock = dia.cta ? `
    <div class="cta">
      <h3>Terminou o Ciclo Zero 🏆</h3>
      <p>Esse foi só o aquecimento. Quer continuar evoluindo comigo te acompanhando de perto, com treino e dieta no seu nome? Tenho uma condição especial pra quem terminou o Ciclo Zero.</p>
      <a href="https://www.instagram.com/personaltrainerlucaslima" target="_blank" rel="noopener">💬 Quero continuar no direct</a>
    </div>` : "";
  const doneBtn = isDone
    ? `<button class="btn done-state full" id="doneBtn">✅ Treino concluído (tocar pra desmarcar)</button>`
    : `<button class="btn gold full" id="doneBtn">💪 Concluí o treino de hoje</button>`;
  const navBtn = proximo
    ? `<button class="btn ghost" id="nextBtn">Próximo dia →</button>`
    : `<button class="btn ghost" id="closeBtn">Fechar</button>`;
  m.innerHTML = `
    <button class="x" onclick="closeAll()">&times;</button>
    <div class="m-emoji">${emojiDia(dia)}</div>
    <p class="m-day">Dia ${dia.d} · ${dia.tipo}</p>
    <h2 class="m-title">${dia.tit}</h2>
    <p class="m-week">${dia.sem}</p>

    <div class="foco">🎯 <b>Foco de hoje:</b> ${dia.foco}</div>

    <div class="block">
      <div class="block-h">🏋️ Treino de hoje</div>
      <ul class="ex-list">${exItems}</ul>
      <div class="tip">💡 <b>Dica:</b> ${dia.dica}</div>
    </div>

    <div class="block">
      <div class="block-h">🥗 Alimentação de hoje</div>
      <div class="food">
        <div class="tema">${dia.alimTema}</div>
        <ul>${foodItems}</ul>
        <div class="ideia">💡 <b>Ideia de hoje:</b> ${dia.alimIdeia}</div>
        <span class="disc">Sugestões gerais de hábitos, não substituem um nutricionista.</span>
      </div>
    </div>

    <div class="block">
      <div class="block-h">💧 Hábito do dia</div>
      <div class="habit">${dia.hab}</div>
    </div>

    <div class="game">
      <div class="gh">🎮 Mostra que você fez!</div>
      <p>Tirou foto do treino ou da refeição de hoje? Posta no <b>Jogo EU vs EU</b> pra eu validar, você pontuar e subir no ranking do grupo.</p>
      <a href="${JOGO_URL}" target="_blank" rel="noopener">🏅 Registrar o Dia ${dia.d} no jogo</a>
    </div>

    <p class="frase">"${dia.fr}"</p>
    ${ctaBlock}
    <div class="m-actions">
      ${doneBtn}
      <div class="row2">${navBtn}</div>
    </div>
  `;
  document.getElementById('doneBtn').onclick = ()=> toggleDone(dia);
  const nb = document.getElementById('nextBtn');
  if(nb) nb.onclick = ()=>{ closeAll(); setTimeout(()=>showContent(proximo), 150); };
  const cb = document.getElementById('closeBtn');
  if(cb) cb.onclick = closeAll;
  document.getElementById('contentOverlay').classList.add('show');
  document.getElementById('contentModal').scrollTop = 0;
}

function toggleDone(dia){
  if(done.includes(dia.d)){
    done = done.filter(x=>x!==dia.d); save(); render(); showContent(dia);
  } else {
    done.push(dia.d); save(); render();
    if(window.fbq) fbq('trackCustom','TreinoConcluido',{dia:dia.d});
    celebrate(dia.d===30 ? ["🏆","🎉","✨","💪","⭐"] : ["💪","🔥","✨","🎉"]);
    showContent(dia);
  }
}

function closeAll(){
  document.getElementById('lockOverlay').classList.remove('show');
  document.getElementById('contentOverlay').classList.remove('show');
  pendingDay = null;
}
[document.getElementById('lockOverlay'),document.getElementById('contentOverlay')].forEach(ov=>{
  ov.addEventListener('click', e=>{ if(e.target===ov) closeAll(); });
});

document.getElementById('reset').onclick = ()=>{
  if(confirm("Isso apaga o seu progresso e tranca todos os dias de novo. Tem certeza?")){
    unlocked = []; done = []; save(); render();
  }
};

window.addEventListener('resize', render);
render();

// ===== TARJA: acesso secreto de preview (?ver=lucas) =====
if(new URLSearchParams(location.search).get('ver') === 'lucas'){
  document.body.classList.remove('teaser-on');
}
</script>
